<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教友善：二位數乘一位數減輕腦力版</title>
    <style>
        :root {
            --primary: #3498db;
            --ones-color: #2ecc71;
            --tens-color: #e67e22;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --highlight: #f1c40f;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            padding: 25px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* 適合學障學生的超大直式版面 */
        .math-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafbfc;
            border: 3px solid #e2e8f0;
            border-radius: 16px;
            padding: 30px 10px;
            margin-bottom: 20px;
        }

        .math-layout {
            font-family: 'Courier New', monospace;
            font-size: 42px;
            font-weight: bold;
            line-height: 1.4;
            text-align: right;
            letter-spacing: 12px;
        }

        .line {
            border-bottom: 4px solid #333;
            margin: 8px 0;
            width: 160px;
            display: inline-block;
        }

        .plus-line {
            border-bottom: 4px double #333;
            margin: 8px 0;
            width: 160px;
            display: inline-block;
        }

        /* 顏色標記，幫助視覺辨識 */
        .t-digit { color: var(--tens-color); }
        .o-digit { color: var(--ones-color); }
        .m-digit { color: #9b59b6; }
        
        .fade-box {
            display: inline-block;
            transition: all 0.4s ease;
            opacity: 0.1;
        }
        .fade-box.show { opacity: 1; }

        .focus-ring {
            background-color: rgba(241, 196, 15, 0.3);
            border-radius: 6px;
            padding: 0 4px;
        }

        /* 特教引導卡片 */
        .guide-box {
            background: #ebf5fb;
            border-left: 8px solid var(--primary);
            padding: 20px;
            border-radius: 8px;
            min-height: 140px;
            margin-bottom: 25px;
        }

        .guide-title {
            font-size: 20px;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .guide-text {
            font-size: 17px;
            color: #34495e;
            line-height: 1.6;
        }

        /* 雙手輔助圖示提示 */
        .hand-tip {
            display: inline-block;
            background: #fff3cd;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            color: #b7791f;
            border: 1px solid #fbd38d;
            margin-top: 5px;
            font-family: sans-serif;
            letter-spacing: normal;
        }

        .btn-layout {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-next { background: var(--primary); color: white; }
        .btn-next:hover { background: #2980b9; }
        .btn-reset { background: #e2e8f0; color: #4a5568; }
        .btn-reset:hover { background: #cbd5e0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎈 慢慢算乘法：27 × 4（不急著進位版）</h1>

    <div class="math-container">
        <div class="math-layout">
            <!-- 題目 -->
            <span id="d-2" class="t-digit">2</span><span id="d-7" class="o-digit">7</span><br>
            <span style="color:#cbd5e1; font-size:30px; letter-spacing:0;">×</span>&nbsp;&nbsp;<span id="d-4" class="m-digit">4</span><br>
            
            <div class="line"></div><br>
            
            <!-- 第一步：個位乘完的結果 -->
            <div id="row-1" class="fade-box">
                <span class="t-digit">2</span><span class="o-digit">8</span>
            </div><br>
            
            <!-- 第二步：十位乘完的結果 -->
            <div id="row-2" class="fade-box">
                <span class="t-digit">8</span><span style="color:#cbd5e1;">0</span>
            </div><br>
            
            <div id="plus-line-box" class="fade-box"><span class="plus-line"></span><span style="font-size:24px; position:absolute; left:40px; margin-top:-5px; color:#e17055;">+</span></div><br>
            
            <!-- 第三步：相加結果 -->
            <div id="row-3" class="fade-box">
                <span>1</span><span class="t-digit">0</span><span class="o-digit">8</span>
            </div>
        </div>
    </div>

    <!-- 特教教學指引區 -->
    <div class="guide-box">
        <div class="guide-title" id="g-title">👋 哈囉！準備好我們就開始囉！</div>
        <div class="guide-text" id="g-text">這個方法不用一邊乘、一邊把數字記在天空中。我們一次只做一件事，把數字寫下來就好。請點擊「下一步」。</div>
    </div>

    <div class="btn-layout">
        <button class="btn btn-reset" onclick="resetPage()">🔄 重頭來</button>
        <button class="btn btn-next" id="next-btn" onclick="goNext()">➡️ 下一步</button>
    </div>
</div>

<script>
    let step = 0;

    const lesson = [
        {
            title: "第一步：對齊定位",
            text: "看一看，<span class='o-digit'>綠色的個位（7和4）</span>排在同一條直線上，<span class='tens-color'>橘色的十位（2）</span>排在左邊。我們準備來算囉！",
            action: () => {
                document.getElementById('d-7').classList.add('focus-ring');
                document.getElementById('d-4').classList.add('focus-ring');
            }
        },
        {
            title: "第二步：右邊個位互相乘",
            text: "用下面的 <span class='m-digit'>4</span> 去乘上面的 <span class='o-digit'>7</span>。<br><b>算式：7 × 4 = ？</b><br><span class='hand-tip'>🖐️ 伸出手指頭或看乘法表：數4個7，或者7個4。算出是 28 喔！</span>",
            action: () => {
                // 保留個位聚焦
            }
        },
        {
            title: "第三步：寫下第一個答案",
            text: "算出來的 <b>28</b>，我們直接整整齊齊地寫在第一橫排。不用把 2 飛到天空中！個位 8 對齊綠色，十位 2 對齊橘色。",
            action: () => {
                document.getElementById('row-1').classList.add('show');
            }
        },
        {
            title: "第四步：下面乘左邊十位",
            text: "接下來，用下面的 <span class='m-digit'>4</span> 去乘左邊十位的 <span class='t-digit'>2</span>。<br><b>算式：2 × 4 = ？</b><br><span class='hand-tip'>🖐️ 用手比比看：2個4是 8。因為它是十位，所以代表 80 喔！</span>",
            action: () => {
                document.getElementById('d-7').classList.remove('focus-ring');
                document.getElementById('d-2').classList.add('focus-ring');
            }
        },
        {
            title: "第五步：寫下第二個答案",
            text: "把剛剛算出的 <b>80</b>（2×4=8，後面補一個0）寫在第二橫排。注意！8 要跟橘色的十位對齊唷！",
            action: () => {
                document.getElementById('row-2').classList.add('show');
                document.getElementById('plus-line-box').classList.add('show');
            }
        },
        {
            title: "第六步：把兩個答案加起來",
            text: "最後，我們忘記乘法，只看加法！把兩排數字垂直加起來：<br>個位：<b>8 + 0 = 8</b><br>十位：<b>2 + 8 = 10</b>（寫0進1）<br>答案就是 <b>108</b>！",
            action: () => {
                document.getElementById('d-2').classList.remove('focus-ring');
                document.getElementById('d-4').classList.remove('focus-ring');
                document.getElementById('row-3').classList.add('show');
            }
        },
        {
            title: "🎉 慢慢算成功！",
            text: "太棒了！不用一邊乘一邊加進位，把兩個答案分開寫再相加，是不是輕鬆多了呢？你做得很好！",
            action: () => {}
        }
    ];

    function goNext() {
        if (step < lesson.length) {
            lesson[step].action();
            document.getElementById('g-title').innerHTML = lesson[step].title;
            document.getElementById('g-text').innerHTML = lesson[step].text;
            step++;
            
            if (step === lesson.length) {
                document.getElementById('next-btn').innerText = "🏁 挑戰完成";
                document.getElementById('next-btn').disabled = true;
            }
        }
    }

    function resetPage() {
        step = 0;
        document.getElementById('d-2').classList.remove('focus-ring');
        document.getElementById('d-7').classList.remove('focus-ring');
        document.getElementById('d-4').classList.remove('focus-ring');
        document.getElementById('row-1').classList.remove('show');
        document.getElementById('row-2').classList.remove('show');
        document.getElementById('row-3').classList.remove('show');
        document.getElementById('plus-line-box').classList.remove('show');
        
        document.getElementById('g-title').innerHTML = "👋 哈囉！準備好我們就開始囉！";
        document.getElementById('g-text').innerHTML = "這個方法不用一邊乘、一邊把數字記在天空中。我們一次只做一件事，把數字寫下來就好。請點擊「下一步」。";
        
        document.getElementById('next-btn').innerText = "➡️ 下一步";
        document.getElementById('next-btn').disabled = false;
    }
</script>

</body>
</html>
